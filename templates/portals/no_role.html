{% extends "base.html" %}
{% block title %}No Access - {{ school.name }}{% endblock %}

{% block content %}
<div class="no-role-page">
	<div class="no-role-card">
		<div class="no-role-icon">
			<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
				<path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V7a4.5 4.5 0 00-9 0v3.5M6.75 10.5h10.5A1.75 1.75 0 0119 12.25v6A1.75 1.75 0 0117.25 20H6.75A1.75 1.75 0 015 18.25v-6a1.75 1.75 0 011.75-1.75z" />
			</svg>
		</div>

		<h1 class="no-role-title">No Role Assigned</h1>

		<p class="no-role-text">
			Your account has no role assigned at {{ school.name }}.
			Please contact your school administrator to request access.
		</p>

		<a href="{% url 'accounts:logout' %}" class="no-role-button">
			Sign Out
		</a>
	</div>
</div>
{% endblock %}
