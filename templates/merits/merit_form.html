{% extends "base.html" %}
{% block title %}{{ title }} — {{ school.name }}{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
	<h1 class="text-2xl font-bold text-gray-800 mb-6">{{ title }}</h1>
	<div class="bg-white rounded-xl shadow p-6
				{% if type == 'merit' %}border-t-4 border-green-500
				{% else %}border-t-4 border-red-500{% endif %}">
		<form method="post" novalidate>
			{% csrf_token %}
			<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
				{% for field in form %}
				<div class="{% if field.name == 'reason' %}col-span-2{% endif %}">
					<label class="block text-xs font-medium text-gray-600 mb-1">
						{{ field.label }}
						{% if field.field.required %}<span class="text-red-500">*</span>{% endif %}
					</label>
					{{ field }}
					{% if field.errors %}
						<p class="text-red-500 text-xs mt-1">{{ field.errors.0 }}</p>
					{% endif %}
				</div>
				{% endfor %}
			</div>
			<div class="flex gap-3 mt-6">
				<button type="submit"
						class="{% if type == 'merit' %}bg-green-600 hover:bg-green-700{% else %}bg-red-600 hover:bg-red-700{% endif %}
							   text-white px-5 py-2 rounded-lg text-sm font-medium transition">
					{{ title }}
				</button>
				<a href="{% url 'merits:list' %}"
				   class="px-5 py-2 rounded-lg text-sm font-medium border border-gray-300 text-gray-600 hover:bg-gray-50 transition">
					Cancel
				</a>
			</div>
		</form>
	</div>
</div>
{% endblock %}
